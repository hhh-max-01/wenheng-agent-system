services:
  - type: web
    name: wenheng-agent-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /api/health
    envVars:
      - key: APP_HOST
        value: 0.0.0.0
      - key: LLM_BASE_URL
        value: https://api.deepseek.com
      - key: LLM_MODEL
        value: deepseek-chat
      - key: LLM_API_KEY
        sync: false
